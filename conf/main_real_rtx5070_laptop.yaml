defaults:
  - task: citation_abstention
  - model: qwen2_5_1_5b_instruct
  - data: main_generated_rtx5070_laptop
  - lora: real_low_vram
  - cache: low_vram
  - methods: main
  - evaluation: main
  - causal: low_vram
  - reporting: default
  - _self_

experiment_name: main_citation_abstention_real_rtx5070_laptop
backend: huggingface
runs_root: runs

model:
  torch_dtype: float16
  device: cuda
  max_seq_length: 384
  max_new_tokens: 80
  inference_batch_size: 1
  attn_implementation: sdpa

lora:
  seed: 21
  learning_rate: 0.00015

evaluation:
  causal_eval_layer: 18
