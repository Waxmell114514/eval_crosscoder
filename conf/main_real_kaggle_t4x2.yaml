defaults:
  - task: citation_abstention
  - model: qwen2_5_3b_instruct
  - data: main_generated
  - lora: real_low_vram
  - cache: low_vram
  - methods: main
  - evaluation: main
  - causal: low_vram
  - reporting: default
  - _self_

experiment_name: main_citation_abstention_real_kaggle_t4x2
backend: huggingface
runs_root: runs

model:
  torch_dtype: float16
  device: cuda:0
  device_map: balanced
  max_memory:
    "0": 14GiB
    "1": 14GiB
    cpu: 48GiB
  max_seq_length: 512
  max_new_tokens: 96
  inference_batch_size: 1
  attn_implementation: sdpa

lora:
  seed: 21
  learning_rate: 0.00015
